    @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800;900&display=swap');
    :root {

      --bg-portrait:url("assets/leaf-portrait-clean.jpg");
      --white:#fbfdff;
      --paper-blue:#263f78;
      --line:rgba(0,213,223,.62);
      --font:"Heebo","Assistant","Noto Sans Hebrew",Arial,sans-serif;
      --stroke:rgba(248,251,255,.78);
    }
    * { box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body { margin:0; min-height:100%; background:#10182b; color:var(--white); font-family:var(--font); overflow-x:hidden; }
    button,input { font:inherit; color:inherit; }
    button { cursor:pointer; }
    .rekama-wrap { width:min(100%,1920px); margin-inline:auto; background:#10182b; }
    .toolbar { position:sticky; top:0; z-index:50; display:flex; flex-wrap:wrap; gap:10px; align-items:center; justify-content:center; padding:14px 16px; background:rgba(11,22,45,.88); backdrop-filter:blur(10px); border-bottom:1px solid rgba(255,255,255,.08); }
    .toolbar input { min-width:min(520px,100%); width:min(520px,100%); border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.08); border-radius:999px; padding:13px 18px; outline:none; }
    .toolbar input::placeholder { color:rgba(255,255,255,.72); }
    .tool-btn { border:1px solid rgba(255,255,255,.14); background:rgba(255,255,255,.08); border-radius:999px; padding:11px 16px; min-width:96px; transition:background .2s ease, transform .2s ease; }
    .tool-btn:hover,.tool-btn:focus-visible { background:rgba(255,255,255,.14); transform:translateY(-1px); outline:none; }
    .tool-meta { font-size:14px; color:rgba(255,255,255,.78); }

    .rekama-page {
      min-height:100vh;
      background:
        radial-gradient(circle at 20% 32%, rgba(255,255,255,.10), transparent 20%),
        linear-gradient(90deg, rgba(32,63,115,.70) 0%, rgba(35,62,120,.90) 43%, rgba(39,62,124,.98) 100%),
        var(--bg-landscape) left top/cover no-repeat,
        var(--paper-blue);
      padding: clamp(28px, 4vw, 48px) clamp(16px, 3vw, 30px) clamp(46px, 5vw, 70px);
    }
    .hero-copy { width:min(100%, 860px); margin:0 auto 24px; text-align:center; }
    .rule { display:block; width:100%; height:1.7px; background:linear-gradient(90deg,transparent,var(--line) 7%,var(--line) 93%,transparent); opacity:.92; }
    .title-lockup { display:grid; grid-template-columns:minmax(0,1.08fr) minmax(0,.92fr); align-items:center; gap:4.6%; direction:ltr; padding-block:clamp(18px, 2.7vw, 28px); }
    .poem { direction:rtl; margin:0; font-size:clamp(24px,2.2vw,42px); font-weight:700; line-height:1.16; letter-spacing:-.025em; text-align:right; white-space:nowrap; text-shadow:0 1px 8px rgba(0,0,0,.18); }
    .main-title { direction:rtl; margin:0; font-size:clamp(58px,5vw,98px); font-weight:900; line-height:.86; letter-spacing:-.052em; text-align:right; text-shadow:0 1px 8px rgba(0,0,0,.16); }
    .intro { width:min(100%, 940px); margin:18px auto 28px; text-align:center; font-size:clamp(16px,1.12vw,20px); line-height:1.55; color:rgba(255,255,255,.9); }

    .circle-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(165px, 1fr)); gap:28px 22px; align-items:start; }
    .memory-slot { width:100%; display:grid; justify-items:center; align-content:start; text-decoration:none; direction:rtl; min-width:0; background:transparent; border:0; padding:0; }
    .photo-holder { width:clamp(128px,8.5vw,166px); aspect-ratio:1/1; border-radius:50%; overflow:hidden; display:grid; place-items:center; background:rgba(25,48,94,.32); box-shadow:0 0 0 clamp(2px,.18vw,4px) var(--stroke), inset -16px 0 28px rgba(255,255,255,.06), inset 18px 0 28px rgba(0,0,0,.08); }
    .photo-holder img { width:100%; height:100%; display:block; object-fit:contain; object-position:center center; background:rgba(255,255,255,.03); filter:grayscale(1) contrast(1.06); }
    .slot-name { margin-top:16px; max-width:145%; color:#fff; font-size:clamp(15px,1.02vw,19px); font-weight:700; line-height:1.12; letter-spacing:-.025em; text-align:center; text-wrap:balance; text-shadow:0 1px 7px rgba(0,0,0,.35); }
    .person-place { display:inline-block; margin-top:8px; padding:4px 10px; border-radius:999px; background:rgba(82,119,201,.28); color:rgba(255,255,255,.92); font-size:13px; }
    .empty-search { display:none; text-align:center; padding:22px; border-radius:18px; background:rgba(255,255,255,.05); color:rgba(255,255,255,.85); width:min(100%, 560px); margin:20px auto 0; }
    .empty-search.show { display:block; }

    @media(max-width:860px),(orientation:portrait) {
      .rekama-page {
        background:
          radial-gradient(circle at 24% 24%, rgba(255,255,255,.11), transparent 23%),
          linear-gradient(90deg, rgba(29,62,115,.66) 0%, rgba(34,62,120,.84) 48%, rgba(40,63,125,.96) 100%),
          var(--bg-portrait) center top/cover no-repeat,
          var(--paper-blue);
      }
      .title-lockup { grid-template-columns:minmax(0,1.06fr) minmax(0,.94fr); gap:5.4%; }
      .poem { font-size:clamp(22px,5.2vw,46px); line-height:1.14; white-space:normal; }
      .main-title { font-size:clamp(46px,11vw,98px); line-height:.84; }
      .circle-grid { grid-template-columns:repeat(2, minmax(0,1fr)); gap:26px 16px; }
      .photo-holder { width:clamp(122px,30vw,190px); }
      .slot-name { font-size:clamp(15px,3.8vw,24px); }
    }
    @media(max-width:520px) {
      .toolbar { justify-content:stretch; }
      .toolbar input { min-width:100%; }
      .title-lockup { gap:13px; padding-block:14px; }
      .poem { font-size:clamp(21px,5.7vw,30px); }
      .main-title { font-size:clamp(40px,10.8vw,58px); }
      .circle-grid { grid-template-columns:repeat(2, minmax(0,1fr)); gap:22px 10px; }
      .photo-holder { width:clamp(102px,28vw,148px); }
      .slot-name { font-size:clamp(13px,3.8vw,18px); max-width:155%; }
    }
  </style>
</head>

      }
      emptySearch.classList.remove('show');
      filtered.forEach(person => allPeopleGrid.appendChild(makeCard(person)));
      countStatus.textContent = `${filtered.length} מתוך ${people.length}`;
    }

    searchInput.addEventListener('input', render);
    prevBtn.addEventListener('click', () => window.scrollBy({ top: -window.innerHeight * 0.82, behavior: 'smooth' }));
    nextBtn.addEventListener('click', () => window.scrollBy({ top: window.innerHeight * 0.82, behavior: 'smooth' }));
    render();
  </script>
</body>
</html>
